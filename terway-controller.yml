apiVersion: v1
kind: ServiceAccount
metadata:
  name: terway-controller
  namespace: kube-system

---

kind: ClusterRole
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: terway-controller-pod-reader
  namespace: kube-system
rules:
  - apiGroups: [ "" ]
    resources: [ "pods", "nodes", "namespaces", "configmaps", "serviceaccounts" ]
    verbs: [ "get", "watch", "list" ]
  - apiGroups: [ "" ]
    resources:
      - events
    verbs:
      - create
  - apiGroups: [ "coordination.k8s.io" ]
    resources: [ "leases" ]
    verbs: [ "get", "watch", "update", "create" ]
  - apiGroups: [ "" ]
    resources:
      - pods/status
    verbs:
      - update
  - apiGroups: [ "network.alibabacloud.com" ]
    resources: [ "*" ]
    verbs: [ "*" ]
  - apiGroups:
      - apiextensions.k8s.io
    resources:
      - customresourcedefinitions
    verbs:
      - create
      - get
      - list
      - watch
      - update
---

apiVersion: rbac.authorization.k8s.io/v1beta1
kind: ClusterRoleBinding
metadata:
  name: terway-controller-binding
  namespace: kube-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: terway-controller-pod-reader
subjects:
  - kind: ServiceAccount
    name: terway-controller
    namespace: kube-system

---

apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: terway-controlplan
  namespace: kube-system
spec:
  selector:
    matchLabels:
      app: terway-controlplan
  template:
    metadata:
      labels:
        app: terway-controlplan
      annotations:
        scheduler.alpha.kubernetes.io/critical-pod: ''
    spec:
      nodeSelector:
        beta.kubernetes.io/arch: amd64
      tolerations:
        - operator: "Exists"
      terminationGracePeriodSeconds: 5
      serviceAccountName: terway-controller
      hostNetwork: false
      containers:
        - name: terway-controller
          image: registry.cn-hangzhou.aliyuncs.com/acs/terway-controller:v1.0.10.333-gfd2b7b8-aliyun
          imagePullPolicy: IfNotPresent
          command: [ '/usr/bin/terway-controllerd', '-log-level', 'debug', '-daemon-mode', 'ENIMultiIP' ]
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          volumeMounts:
            - name: configvolume
              mountPath: /etc/eni
        - name: terway-webhook
          image: registry.cn-hangzhou.aliyuncs.com/acs/terway-controller:v1.0.10.333-gfd2b7b8-aliyun
          imagePullPolicy: IfNotPresent
          command: [ "/bin/policyinit.sh" ]
          env:
            - name: K8S_POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: K8S_NODE_NAME
              valueFrom:
                fieldRef:
                  apiVersion: v1
                  fieldPath: spec.nodeName
            - name: VPC_ID
              valueFrom:
                configMapKeyRef:
                  name: ack-cluster-profile
                  key: vpcid
            - name: CLUSTER_ID
              valueFrom:
                configMapKeyRef:
                  name: ack-cluster-profile
                  key: clusterid
          resources:
            requests:
              cpu: 250m
          livenessProbe:
            tcpSocket:
              port: 9099
              host: localhost
            periodSeconds: 10
            initialDelaySeconds: 10
            failureThreshold: 6
          readinessProbe:
            tcpSocket:
              port: 9099
              host: localhost
            periodSeconds: 10
          volumeMounts:
            - mountPath: /etc/eni
              name: configvolume
      volumes:
        - name: configvolume
          configMap:
            name: eni-config
            items:
              - key: eni_conf
                path: eni.json
              - key: 10-terway-controller.conf
                path: 10-terway-controller.conf
